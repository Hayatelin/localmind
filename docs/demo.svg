<text x="430.0" y="22" fill="#8b949e" font-size="12.5" text-anchor="middle">localmind — privacy-first local AI assistant</text>
<text x="20" y="60" fill="#e6edf3" font-size="14" xml:space="preserve">$ localmind            # 100% local · data never leaves your machine</text>
<text x="20" y="82" fill="#c9d1d9" font-size="14" xml:space="preserve"></text>
<text x="20" y="104" fill="#e6edf3" font-size="14" xml:space="preserve">you&gt; add note Buy lab coats for clinic</text>
<text x="20" y="126" fill="#3fb950" font-size="14" xml:space="preserve">[notes] Saved note #1: Buy lab coats for clinic</text>
<text x="20" y="148" fill="#c9d1d9" font-size="14" xml:space="preserve"></text>
<text x="20" y="170" fill="#e6edf3" font-size="14" xml:space="preserve">you&gt; remind me to call the supplier at 3pm</text>
<text x="20" y="192" fill="#3fb950" font-size="14" xml:space="preserve">[reminders] Reminder #1 set: call the supplier (due: 3pm)</text>
<text x="20" y="214" fill="#c9d1d9" font-size="14" xml:space="preserve"></text>
<text x="20" y="236" fill="#e6edf3" font-size="14" xml:space="preserve">you&gt; calc (1200 * 0.3) + 540</text>
<text x="20" y="258" fill="#3fb950" font-size="14" xml:space="preserve">[calc] (1200 * 0.3) + 540 = 900</text>
<text x="20" y="280" fill="#c9d1d9" font-size="14" xml:space="preserve"></text>
<text x="20" y="302" fill="#e6edf3" font-size="14" xml:space="preserve">you&gt; list notes</text>
<text x="20" y="324" fill="#c9d1d9" font-size="14" xml:space="preserve">[notes] Your notes:  [1] Buy lab coats for clinic</text>
<text x="20" y="346" fill="#c9d1d9" font-size="14" xml:space="preserve"></text>
<text x="20" y="368" fill="#58a6ff" font-size="14" xml:space="preserve">skills: notes · reminders · file_search · calc   (drop-in plugins)</text>
